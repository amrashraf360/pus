<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PUS STORE | المتجر المتكامل</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --main-blue: #3a5b70; --light-blue: #527a94; --bg-gray: #f0f7f9; }
        body { background-color: var(--bg-gray); font-family: sans-serif; padding-bottom: 80px; }
        
        /* إخفاء الصفحات افتراضياً */
        .page { display: none; animation: fadeIn 0.3s ease; }
        .page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* ستايل الكروت اللي في تصميمك */
        .game-card { background: var(--main-blue); border-radius: 15px; aspect-ratio: 1/1; position: relative; transition: 0.3s; cursor: pointer; }
        .game-card:active { transform: scale(0.95); }
        .badge { position: absolute; top: -5px; right: -5px; background: #a5d8eb; color: var(--main-blue); padding: 2px 8px; border-radius: 8px; font-weight: bold; font-size: 12px; }
        
        /* القائمة السفلية */
        .nav-item { color: #94a3b8; transition: 0.3s; }
        .nav-item.active { color: var(--main-blue); font-weight: bold; }
    </style>
</head>
<body>

    <header class="bg-[#3a5b70] p-4 flex justify-between items-center text-white sticky top-0 z-50">
        <div class="flex items-center gap-2">
            <img src="https://via.placeholder.com/30" class="rounded" alt="Logo"> <span class="font-bold italic text-xl">PUS</span>
        </div>
        <div class="text-left text-[10px] leading-tight opacity-90">
            اشحن، العب، واتشهر..<br>كل اللي تحتاجه في مكان واحد
        </div>
    </header>

    <section id="page-buy" class="page active p-4">
        <div class="flex gap-4 mb-6 overflow-x-auto no-scrollbar font-bold text-[#3a5b70]">
            <button class="bg-[#bdcad1] px-5 py-2 rounded-full shadow-sm">الألعاب</button>
            <button class="px-5 py-2">التطبيقات</button>
            <button class="px-5 py-2">الجيف كارد</button>
        </div>

        <div class="grid grid-cols-3 gap-3">
            <div onclick="openProduct('PUBG')" class="game-card flex flex-col justify-end p-2 text-center text-white text-[10px]">
                <div class="mb-auto mt-4 text-2xl opacity-20"><i class="fa-solid fa-crown"></i></div>
                <span class="font-bold uppercase">PUBG MOBILE</span>
            </div>
            <div class="game-card flex flex-col justify-end p-2 text-center text-white text-[10px]">
                <div class="mb-auto mt-4 text-2xl opacity-20"><i class="fa-solid fa-fire"></i></div>
                <span class="font-bold uppercase">FREE FIRE</span>
            </div>
            <div class="game-card flex flex-col justify-end p-2 text-center text-white text-[10px]">
                <div class="mb-auto mt-4 text-2xl opacity-20"><i class="fa-brands fa-tiktok"></i></div>
                <span class="font-bold uppercase">TIK TOK</span>
            </div>
            <div class="game-card flex flex-col justify-end p-2 text-center text-white text-[10px]"></div>
            <div class="game-card flex flex-col justify-end p-2 text-center text-white text-[10px]"></div>
            <div class="game-card flex flex-col justify-end p-2 text-center text-white text-[10px]"></div>
        </div>
    </section>

    <section id="page-offers" class="page p-4">
        <h2 class="text-[#3a5b70] font-bold mb-4">أفضل العروض والمتاحة:</h2>
        <div class="grid grid-cols-3 gap-3">
            <div class="game-card flex flex-col justify-end p-2 text-center text-white text-[10px]">
                <span class="badge">%30</span>
                <span class="font-bold">PUBG MOBILE</span>
            </div>
            </div>
    </section>

    <section id="page-market" class="page p-4">
        <div class="flex gap-4 mb-6 font-bold text-[#3a5b70]">
            <button class="bg-[#bdcad1] px-5 py-2 rounded-full shadow-sm">الألعاب</button>
            <button class="px-5 py-2">رقمي</button>
        </div>
        <div class="grid grid-cols-3 gap-3">
            <div class="game-card flex flex-col justify-end p-2 text-white text-[8px] leading-tight">
                <div class="bg-[#2a4454] p-1 rounded mb-1">7,000 EGP</div>
                <span class="font-bold">حساب PUBG MOBILE</span>
            </div>
        </div>
    </section>

    <section id="page-profile" class="page p-4">
        <div class="bg-white rounded-3xl p-6 text-center shadow-md">
            <div class="w-20 h-20 bg-gray-200 rounded-full mx-auto mb-4 border-4 border-[#a5d8eb] flex items-center justify-center text-3xl text-[#3a5b70]">
                <i class="fa-solid fa-user"></i>
            </div>
            <h3 class="font-bold text-xl text-[#3a5b70]">Amr Ashraf</h3>
            <p class="text-sm text-gray-400 mb-6">ID: 10025488</p>
            
            <div class="space-y-3">
                <button class="w-full bg-[#3a5b70] text-white py-3 rounded-xl font-bold flex items-center justify-between px-5">
                    <span>محفظتي</span> <i class="fa-solid fa-wallet"></i>
                </button>
                <button class="w-full border-2 border-[#3a5b70] text-[#3a5b70] py-3 rounded-xl font-bold">طلباتي السابقة</button>
                <button onclick="window.location.href='https://wa.me/201016606827'" class="w-full text-red-500 font-bold py-2">تسجيل الخروج</button>
            </div>
        </div>
    </section>

    <nav class="fixed bottom-0 inset-x-0 h-20 bg-white border-t flex justify-around items-center px-2 z-[100]">
        <button onclick="navTo('buy', this)" class="nav-item active flex flex-col items-center gap-1">
            <i class="fa-solid fa-shop text-xl"></i>
            <span class="text-[10px]">متجر الشراء</span>
        </button>
        <button onclick="navTo('offers', this)" class="nav-item flex flex-col items-center gap-1">
            <i class="fa-solid fa-percent text-xl"></i>
            <span class="text-[10px]">أخر العروض</span>
        </button>
        <button onclick="navTo('market', this)" class="nav-item flex flex-col items-center gap-1">
            <i class="fa-solid fa-cart-shopping text-xl"></i>
            <span class="text-[10px]">متجر التسوق</span>
        </button>
        <button onclick="navTo('profile', this)" class="nav-item flex flex-col items-center gap-1">
            <i class="fa-solid fa-user-circle text-xl"></i>
            <span class="text-[10px]">حسابي</span>
        </button>
    </nav>

    <script>
        // وظيفة التنقل بين الصفحات
        function navTo(pageId, btn) {
            // إخفاء كل الصفحات
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            // إظهار الصفحة اللي ضغطت عليها
            document.getElementById('page-' + pageId).classList.add('active');
            
            // تحديث شكل الأزرار
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            btn.classList.add('active');
        }

        // وظيفة الضغط على لعبة (فتح صفحة تفاصيل)
        function openProduct(gameName) {
            alert('أنت الآن تطلب شحن: ' + gameName + '\nسيتم نقلك لصفحة الأسعار..');
            // هنا تقدر تضيف كود يفتح صفحة تانية بأسعار الـ UC
        }
    </script>
</body>
</html>
