<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>متجر PUS Gaming</title>
    <style>
        /* هنا بنعمل "الشكل" اللي هو الـ CSS */
        body {
            background-color: #0b0f19; /* خلفية داكنة */
            color: #ffffff;
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 50px;
        }
        .card {
            background: linear-gradient(145deg, #1e293b, #0f172a);
            border: 1px solid #334155;
            border-radius: 20px;
            padding: 30px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            width: 280px;
        }
        .price-tag {
            color: #22d3ee; /* لون سماوي فوسفوري */
            font-size: 28px;
            margin: 15px 0;
            font-weight: bold;
        }
        .buy-button {
            background: #22d3ee;
            color: #000;
            border: none;
            padding: 12px 25px;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            transition: 0.3s;
        }
        .buy-button:hover {
            background: #fff;
            transform: scale(1.05);
        }
    </style>
</head>
<body>

    <div class="card">
        <h2>باقة 325 UC</h2>
        <div class="price-tag">250 EGP</div>
        <button class="buy-button" id="purchaseBtn">شراء الآن</button>
    </div>

    <script>
        document.getElementById('purchaseBtn').onclick = function() {
            // الأمر اللي بيتنفذ لما تضغط على الزرار
            alert('تم توجيهك لصفحة الدفع الخاصة بـ PUS Gaming');
            window.location.href = "https://wa.me/201234567890"; // حط رقم الواتساب بتاعك هنا
        };
    </script>

</body>
</html>
